---
- name: Join worker to Swarm
  command: "docker swarm join --token {{ swarm_worker_token }} {{ swarm_manager_ip }}:2377"
  register: swarm_join
  changed_when: "'This node joined a swarm as a worker' in swarm_join.stdout"
  failed_when: "swarm_join.rc != 0 and 'This node is already part of a swarm' not in swarm_join.stderr"