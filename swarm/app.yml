version: '3.8'
services:
  backend:
    image: ${ECR_BACKEND}:${VERSION}
    environment:
      - MONGO_URI=mongodb://mongo:27017/app
      - NODE_ENV=production
      - LOG_LEVEL=info
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
      labels:
        traefik.enable: "true"
        traefik.http.routers.backend.rule: "Host(`orangecaramel.online`)"
        traefik.http.routers.backend.entrypoints: "websecure"
        traefik.http.routers.backend.tls.certresolver: "myresolver"
        traefik.http.services.backend.loadbalancer.server.port: "3000"
        traefik.docker.network: "app_app-network"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - app-network

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: app
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == worker
    networks:
      - app-network

volumes:
  mongo-data:
    driver: local

networks:
  app-network:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.overlay.vxlanid: "4096"