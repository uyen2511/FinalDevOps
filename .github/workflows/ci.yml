name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - kaykay
  pull_request:
    branches:
      - main
      - kaykay

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: ./src

      - name: Run Linter (ESLint)
        run: npm run lint || true
        working-directory: ./src

      - name: Run Tests
        run: npm test || true
        working-directory: ./src

      - name: Build application
        run: npm run build || true
        working-directory: ./src

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: finaldevops/backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finaldevops/backend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: finaldevops/backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: |
            swarm/app.yml

      # ----------------------------------------------------------------
      # Deploy lên EC2 — chỉ chạy khi push lên main hoặc kaykay
      # ----------------------------------------------------------------
      - name: Deploy to Docker Swarm on EC2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/kaykay')
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

          # 1. SSH vào server tạo thư mục swarm (nếu chưa có)
          ssh -i /tmp/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.SWARM_MANAGER_IP }} \
            "mkdir -p /home/ubuntu/swarm"

          # 2. Quăng file app.yml lên server
          scp -i /tmp/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            swarm/app.yml \
            ubuntu@${{ secrets.SWARM_MANAGER_IP }}:/home/ubuntu/swarm/app.yml

          # 3. Lấy mật khẩu ECR từ GitHub, SSH vào EC2, login rồi deploy stack
          ECR_PASS=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})
          ssh -i /tmp/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.SWARM_MANAGER_IP }} \
            "echo $ECR_PASS | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} \
             && VERSION=$IMAGE_TAG \
                REGISTRY=${{ steps.login-ecr.outputs.registry }} \
                docker stack deploy \
                  -c /home/ubuntu/swarm/app.yml \
                  app \
                  --with-registry-auth \
                  --prune"

          # 4. Xoá key tạm
          rm -f /tmp/deploy_key.pem