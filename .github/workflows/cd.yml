name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: ["main", "develop"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Get commit SHA from workflow run
        id: commit
        run: echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
      
      - name: Get ECR Login Password
        id: ecr
        run: echo "password=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> $GITHUB_OUTPUT
      
      - name: Deploy to Swarm via SSH
        uses: appleboy/ssh-action@master
        env:
          ECR_PASSWORD: ${{ steps.ecr.outputs.password }}
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ECR_PASSWORD
          command_timeout: 5m
          script: |
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY_BACKEND }}
            cd ~/FinalDevOps
            git fetch origin && git checkout ${{ github.event.workflow_run.head_branch }} && git pull origin ${{ github.event.workflow_run.head_branch }} || true
            export REGISTRY=${{ secrets.ECR_REGISTRY_BACKEND }}
            export VERSION=${{ steps.commit.outputs.sha }}
            
            # Tạo network trước (bỏ qua lỗi nếu đã tồn tại)
            docker network create --driver overlay --attachable app_app-network 2>/dev/null || true
            
            # Deploy stacks
            docker stack deploy --detach=true -c swarm/traefik.yml traefik
            docker stack deploy --detach=true --resolve-image=never --with-registry-auth -c swarm/app.yml app
            docker stack deploy --detach=true -c swarm/monitoring.yml monitoring
      
      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SWARM_MANAGER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 20
            docker service ls
            docker service ps app_backend || true
